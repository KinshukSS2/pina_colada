name: traffic-control-openenv
description: Advanced deterministic traffic benchmark testing POMDP resilience, spatial reasoning, and dynamic constraints.
entry_point: server.main:app

actions:
  type: text
  grammar:
    - hold
    - switch
    - prioritize_emergency
    - set_ns_green:<n>
    - set_ew_green:<n>

observations:
  type: json
  schema: Observation
  keys:
    - timestep
    - current_phase
    - ascii_minimap
    - sensor_status
    - pedestrian_waiting
    - action_mask
    - green_duration
    - queue_ns
    - queue_ew
    - emergency_ns
    - emergency_ew

tasks:
  - id: easy
    description: Balanced daytime traffic with low emergency pressure.
    grader: true
    has_grader: true
  - id: medium
    description: Directional rush-hour traffic with periodic emergency requests.
    grader: true
    has_grader: true
  - id: hard
    description: Congested bidirectional flow with emergency contention.
    grader: true
    has_grader: true
  - id: chaos
    description: Extreme stress test with simultaneous emergencies, platoons, and sensor blackouts.
    grader: true
    has_grader: true
