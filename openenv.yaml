spec_version: 1
name: ticket_triage
description: "Customer support ticket triage environment — route tickets to the correct department with appropriate priority under SLA pressure."
type: space
runtime: fastapi
app: server.app:app
entry_point: server.app:app
port: 7860

actions:
  - "assign:<priority>:<department>"
  - escalate
  - defer
  - skip
  - "resolve:<ticket_id>"

observations:
  - current_ticket_id
  - current_ticket_subject
  - current_ticket_category_hint
  - current_ticket_urgency_hint
  - current_ticket_is_vip
  - current_ticket_sla_remaining
  - current_ticket_wait_time
  - current_ticket_info_hidden
  - queue_size
  - queue_by_priority
  - sla_breaches
  - sla_warnings
  - department_load
  - department_capacity
  - tickets_resolved
  - correct_assignments
  - incorrect_assignments
  - action_mask
  - score_estimate

tasks:
  easy:
    difficulty: easy
    description: "Single-queue ticket triage — assign priority and route tickets to the correct department."
  medium:
    difficulty: medium
    description: "Multi-queue triage with SLA deadlines, escalation, and department capacity limits."
  hard:
    difficulty: hard
    description: "VIP customers, tight SLAs, partial information, and limited department capacity."
