name: traffic-control-openenv
description: Advanced deterministic traffic benchmark testing POMDP resilience, spatial reasoning, and dynamic constraints.
entry_point: server.main:app

actions:
  type: text
  grammar:
    - hold
    - switch
    - prioritize_emergency
    - set_ns_green:<n>
    - set_ew_green:<n>

observations:
  type: json
  schema: Observation
  keys:
    - timestep
    - current_phase
    - ascii_minimap
    - sensor_status
    - pedestrian_waiting
    - action_mask
    - green_duration
    - queue_ns
    - queue_ew
    - emergency_ns
    - emergency_ew

tasks:
  - id: easy
    grader: env.grader:compute_grade
    has_grader: true
  - id: medium
    grader: env.grader:compute_grade
    has_grader: true
  - id: hard
    grader: env.grader:compute_grade
    has_grader: true
  - id: chaos
    grader: env.grader:compute_grade
    has_grader: true
